name: edge

on:
  push:
    branches: [main, master]

# Cancel an in-flight edge build if a newer commit lands.
concurrency:
  group: edge
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build snapshot artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          # --snapshot: no tag needed, skips publish. --skip=sign: no GPG key required for edge.
          args: release --snapshot --clean --skip=sign
      - name: Publish rolling edge pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Move the 'edge' tag/release to the latest main commit.
          gh release delete edge --yes --cleanup-tag || true
          gh release create edge \
            --prerelease \
            --target "$COMMIT_SHA" \
            --title "edge (latest main)" \
            --notes "Unsigned snapshot built from the latest commit on \`main\`. Not for production and not in any registry. Install via dev_overrides or a filesystem mirror — see PUBLISHING.md." \
            dist/*.zip dist/*_SHA256SUMS

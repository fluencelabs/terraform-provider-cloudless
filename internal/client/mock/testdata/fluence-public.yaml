components:
  schemas:
    AddPublicIpRequest:
      type: object
      required:
      - publicIpId
      properties:
        publicIpId:
          $ref: '#/components/schemas/UserPublicIpId'
    AddStoragesRequest:
      type: object
      required:
      - dataDisks
      properties:
        dataDisks:
          type: array
          items:
            $ref: '#/components/schemas/UserStorageId'
    AvailableStorageDto:
      type: object
      required:
      - storageType
      - replicated
      - volumeGb
      properties:
        replicated:
          type: boolean
        storageType:
          $ref: '#/components/schemas/StorageTypeDto'
        volumeGb:
          type: integer
          format: u-int64
          example: '100'
          minimum: 0
    ClusterDto:
      type: object
      required:
      - id
      - name
      - dc_id
      properties:
        dc_id:
          type: string
          example: 92e6ed24-8bfa-4737-9409-a1aac994e1f5
        id:
          type: string
          example: 92e6ed24-8bfa-4737-9409-a1aac994e1f5
        name:
          type: string
          example: Cloudless
    ClusterId:
      type: string
      format: uuid
    ClusterResourcesDto:
      type: object
      required:
      - availablePublicIps
      - availableStorage
      - availableConfigurations
      properties:
        availableConfigurations:
          type: array
          items:
            $ref: '#/components/schemas/VmConfigurationDto'
        availablePublicIps:
          type: object
          additionalProperties:
            type: integer
            format: u-int16
            minimum: 0
          propertyNames:
            type: string
            enum:
            - V4
            - V6
          example:
            V4:
              $serde_json::private::Number: '10'
            V6:
              $serde_json::private::Number: '150'
        availableStorage:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/AvailableStorageDto'
          propertyNames:
            type: string
            enum:
            - AMD_ZEN2
            - AMD_ZEN3
            - AMD_ZEN5
          example:
            AMD_ZEN3:
            - replicated: true
              storageType: NVME
              volumeGb:
                $serde_json::private::Number: '100'
            - replicated: false
              storageType: NVME
              volumeGb:
                $serde_json::private::Number: '200'
    CostRequest:
      type: object
      required:
      - resources
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/PricingResourceTypeDto'
        secs:
          type:
          - integer
          - 'null'
          format: u-int64
          minimum: 0
    CostResult:
      type: object
      required:
      - costOfResources
      - totalCostPerSec
      - periodSecs
      - totalCost
      properties:
        costOfResources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCostDto'
        periodSecs:
          type: integer
          format: u-int64
          minimum: 0
        totalCost:
          type: string
          example: '0.1'
        totalCostPerSec:
          type: string
          example: '0.01'
    CpuFamilyDto:
      type: string
      enum:
      - AMD_ZEN2
      - AMD_ZEN3
      - AMD_ZEN5
    CreateUserPublicIdRequest:
      type: object
      required:
      - clusterId
      - name
      - addressType
      properties:
        addressType:
          $ref: '#/components/schemas/NewIpAddressType'
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        name:
          type: string
    CreateUserSecurityGroupRequest:
      type: object
      required:
      - clusterId
      - name
      properties:
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        egressRules:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SecurityGroupRuleDto'
        ingressRules:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SecurityGroupRuleDto'
        name:
          type: string
    CreateUserSshKeyRequest:
      type: object
      required:
      - publicKey
      - name
      properties:
        name:
          type: string
          description: A human-readable display name for this key, used to easily identify the SSH keys when they are displayed.
          example: my-key
        publicKey:
          type: string
          description: |-
            The public key in OpenSSH format. Supported algorithms are:
            - ECDSA (nistp256, nistp384, nistp521)
            - RSA
            - ED25519
          example: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKgJIjnDg1DjqOOxINs78oU3f7PJXIyq9uiNocNVhXNx user@example.com
    CreateUserStorageRequest:
      type: object
      required:
      - clusterId
      - name
      - storageType
      - volumeGb
      - replicated
      properties:
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        name:
          type: string
        osImage:
          type:
          - string
          - 'null'
          example: https://example.com/image.qcow2
        replicated:
          type: boolean
        storageType:
          $ref: '#/components/schemas/NewStorageType'
        volumeGb:
          type: integer
          format: u-int32
          minimum: 0
    CreateUserSubnetRequest:
      type: object
      required:
      - clusterId
      - name
      properties:
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        ipv4Cidr:
          type:
          - string
          - 'null'
          example: 10.0.0.0/24
        ipv6Cidr:
          type:
          - string
          - 'null'
          example: 2001:db8::/64
        name:
          type: string
    CreateUserVmRequest:
      type: object
      required:
      - clusterId
      - name
      - configurationId
      - bootDisk
      properties:
        bootDisk:
          $ref: '#/components/schemas/VmBootDisk'
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        configurationId:
          $ref: '#/components/schemas/VmConfigurationId'
        dataDisks:
          type: array
          items:
            $ref: '#/components/schemas/VmDataDisk'
        name:
          type: string
        publicIp:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmPublicIp'
        sshKeys:
          type: array
          items:
            $ref: '#/components/schemas/UserSshKeyId'
    CreateUserVpcRequest:
      type: object
      required:
      - clusterId
      - name
      properties:
        clusterId:
          $ref: '#/components/schemas/ClusterId'
        enableExternal:
          type:
          - boolean
          - 'null'
